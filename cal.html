<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Futuristic AI Calculator</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;500&display=swap" rel="stylesheet">
    <style>
        /* CSS: Enhanced Premium Look */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(circle at center, #1e293b 0%, #020617 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
        }

        /* Container Heading */
        .main-container {
            text-align: center;
        }

        h1 {
            color: #38bdf8;
            font-family: 'Orbitron', sans-serif;
            font-size: 1.8rem;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 4px;
            text-shadow: 0 0 15px rgba(56, 189, 248, 0.6);
        }

        /* Glassmorphism Effect */
        .calculator {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 30px;
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5), 
                        inset 0 0 20px rgba(56, 189, 248, 0.1);
            width: 380px;
            position: relative;
        }

        /* AI Status Light */
        .ai-status {
            position: absolute;
            top: 15px;
            right: 40px;
            width: 8px;
            height: 8px;
            background: #22c55e;
            border-radius: 50%;
            box-shadow: 0 0 10px #22c55e;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.3; }
            100% { opacity: 1; }
        }

        /* Enhanced Display */
        #display {
            width: 100%;
            height: 90px;
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid rgba(56, 189, 248, 0.3);
            color: #f8fafc;
            font-family: 'Orbitron', sans-serif;
            font-size: 2.2rem;
            text-align: right;
            padding: 20px;
            border-radius: 20px;
            margin-bottom: 25px;
            outline: none;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.5);
        }

        /* Grid Layout */
        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
        }

        /* Futuristic Buttons */
        button {
            height: 70px;
            border-radius: 20px;
            border: none;
            background: rgba(51, 65, 85, 0.5);
            color: #cbd5e1;
            font-size: 1.3rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            border-bottom: 3px solid rgba(0,0,0,0.3);
        }

        button:hover {
            background: rgba(71, 85, 105, 0.8);
            color: white;
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        button:active {
            transform: translateY(1px);
            border-bottom: none;
        }

        /* Special Button Colors */
        .operator {
            color: #38bdf8;
            background: rgba(12, 74, 110, 0.4);
            font-family: 'Orbitron', sans-serif;
        }

        .action-btns {
            color: #fb7185;
            background: rgba(159, 18, 57, 0.2);
        }

        .equal {
            background: linear-gradient(135deg, #0ea5e9, #2563eb);
            color: white;
            grid-column: span 2;
            width: auto;
            border-radius: 20px;
            box-shadow: 0 0 20px rgba(37, 99, 235, 0.4);
            border-bottom: 3px solid #1e40af;
        }

        .equal:hover {
            box-shadow: 0 0 30px rgba(56, 189, 248, 0.6);
            background: linear-gradient(135deg, #38bdf8, #3b82f6);
        }

        /* Footer text */
        .footer {
            margin-top: 20px;
            color: rgba(255, 255, 255, 0.3);
            font-size: 0.8rem;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="main-container">
        <h1>Nova AI</h1>
        
        <div class="calculator">
            <div class="ai-status"></div>
            <input type="text" id="display" placeholder="0" readonly>
            
            <div class="buttons">
                <button class="action-btns" onclick="clearDisplay()">AC</button>
                <button class="action-btns" onclick="deleteLast()">DEL</button>
                <button class="operator" onclick="appendToDisplay('%')">%</button>
                <button class="operator" onclick="appendToDisplay('/')">÷</button>
                
                <button onclick="appendToDisplay('7')">7</button>
                <button onclick="appendToDisplay('8')">8</button>
                <button onclick="appendToDisplay('9')">9</button>
                <button class="operator" onclick="appendToDisplay('*')">×</button>
                
                <button onclick="appendToDisplay('4')">4</button>
                <button onclick="appendToDisplay('5')">5</button>
                <button onclick="appendToDisplay('6')">6</button>
                <button class="operator" onclick="appendToDisplay('-')">−</button>
                
                <button onclick="appendToDisplay('1')">1</button>
                <button onclick="appendToDisplay('2')">2</button>
                <button onclick="appendToDisplay('3')">3</button>
                <button class="operator" onclick="appendToDisplay('+')">+</button>
                
                <button onclick="appendToDisplay('0')">0</button>
                <button onclick="appendToDisplay('.')">.</button>
                <button class="equal" onclick="calculate()">SOLVE</button>
            </div>
        </div>

        <p class="footer">SYSTEM READY • V2.0.4</p>
    </div>
    <script>
        const screen = document.getElementById('display');

        function appendToDisplay(value) {
            if (screen.value === "Error") screen.value = "";
            screen.value += value;
            // Sound effect ya haptic feel ke liye yahan logic aa sakta hai
        }

        function clearDisplay() {
            screen.style.opacity = "0.5";
            setTimeout(() => {
                screen.value = "";
                screen.style.opacity = "1";
            }, 100);
        }

        function deleteLast() {
            screen.value = screen.value.slice(0, -1);
        }

        function calculate() {
            try {
                // Calculation se pehle thoda "processing" effect dikhane ke liye
                if (screen.value === "") return;
                
                let result = eval(screen.value);
                
                // Agar result lamba hai to fix kar dein
                if (result.toString().includes('.')) {
                    result = result.toFixed(4);
                }
                
                screen.value = result;
            } catch (err) {
                screen.value = "Error";
                setTimeout(clearDisplay, 1500);
            }
        }
    </script>
</body>
</html>
